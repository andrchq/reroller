services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: reroller
      POSTGRES_USER: reroller
      POSTGRES_PASSWORD: reroller
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  app:
    build: .
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql://reroller:reroller@postgres:5432/reroller?schema=public
      REDIS_URL: redis://redis:6379
      APP_SECRET_KEY: ${APP_SECRET_KEY}
      AUTH_SECRET: ${AUTH_SECRET}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    ports:
      - "3000:3000"
    command: sh -c "npx prisma migrate deploy && npm run start"

  worker:
    build: .
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql://reroller:reroller@postgres:5432/reroller?schema=public
      REDIS_URL: redis://redis:6379
      APP_SECRET_KEY: ${APP_SECRET_KEY}
      AUTH_SECRET: ${AUTH_SECRET}
    command: sh -c "npx prisma migrate deploy && npm run worker"

volumes:
  postgres-data:
  redis-data:
